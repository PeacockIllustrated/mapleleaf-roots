name: Products — nightly Facts-family delta

on:
  # Nightly cron disabled while reverting to the curated INTERNAL_CATALOGUE
  # baseline (see migration 20260505_010). Re-enable by uncommenting the
  # schedule block below once sync quality is addressed.
  # schedule:
  #   # 02:00 UTC (03:00 BST / 02:00 GMT). OFF's dump regenerates around
  #   # 00:00 UTC so this gives us a fresh feed to pull deltas against.
  #   - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'delta (default) or seed'
        required: false
        default: 'delta'
        type: choice
        options:
          - delta
          - seed

jobs:
  sync:
    name: ${{ github.event.inputs.mode || 'delta' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      # Let `packageManager` in package.json be the source of truth for
      # pnpm — specifying a `version` here conflicts with it.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Nightly delta
        if: ${{ (github.event.inputs.mode || 'delta') == 'delta' }}
        run: pnpm products:nightly:ci

      # For the seed, curl the dumps to /tmp first — more resilient than
      # Node's 10-second fetch connect timeout when OFF's CDN is slow.
      # curl retries, resumes, and hands us a clean .gz we can stream.
      - name: Download Facts-family dumps
        if: ${{ github.event.inputs.mode == 'seed' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/dumps
          curl -L --fail --retry 5 --retry-connrefused --retry-delay 10 \
               --connect-timeout 60 --max-time 3600 \
               -A 'Mapleleaf-Roots/1.0 seed fetch' \
               -o /tmp/dumps/off.jsonl.gz \
               https://static.openfoodfacts.org/data/openfoodfacts-products.jsonl.gz
          curl -L --fail --retry 5 --retry-connrefused --retry-delay 10 \
               --connect-timeout 60 --max-time 900 \
               -A 'Mapleleaf-Roots/1.0 seed fetch' \
               -o /tmp/dumps/obf.jsonl.gz \
               https://static.openbeautyfacts.org/data/openbeautyfacts-products.jsonl.gz
          curl -L --fail --retry 5 --retry-connrefused --retry-delay 10 \
               --connect-timeout 60 --max-time 900 \
               -A 'Mapleleaf-Roots/1.0 seed fetch' \
               -o /tmp/dumps/opf.jsonl.gz \
               https://static.openproductsfacts.org/data/openproductsfacts-products.jsonl.gz
          curl -L --fail --retry 5 --retry-connrefused --retry-delay 10 \
               --connect-timeout 60 --max-time 900 \
               -A 'Mapleleaf-Roots/1.0 seed fetch' \
               -o /tmp/dumps/opff.jsonl.gz \
               https://static.openpetfoodfacts.org/data/openpetfoodfacts-products.jsonl.gz
          ls -lh /tmp/dumps

      - name: Full seed from dumps
        if: ${{ github.event.inputs.mode == 'seed' }}
        env:
          SEED_DUMP_DIR: /tmp/dumps
        run: pnpm products:seed:ci
